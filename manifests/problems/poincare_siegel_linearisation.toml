id = "poincare_siegel_linearisation"
title = "Poincaré–Siegel linearisation theorem"
test = false
module = "LeanEval.ComplexAnalysis.PoincareSiegel"
holes = ["poincare_siegel"]
submitter = "Kim Morrison"
notes = "§83 (additional statement 1) of Knill's 'Some Fundamental Theorems in Mathematics'. If α is Diophantine, λ = e^{2πiα}, and f is holomorphic near 0 with f 0 = 0 and f'(0) = λ, then f is locally analytically conjugate to z ↦ λz: there is a holomorphic germ u with u 0 = 0, u'(0) = 1, and f(u z) = u(λ z) near 0 — an analytic solution of the Schröder equation. The file ships the IsDiophantine predicate (exponent 2 form: C/q² ≤ |α − p/q| for some C > 0 and all integers p, q with q ≠ 0). Mathlib has AnalyticAt and deriv, so the statement elaborates with no new definitions beyond IsDiophantine. The only Lean trace of Siegel's theorem is a passing citation in Mathlib/Analysis/Analytic/Inverse.lean; the theorem itself is absent."
source = "C. L. Siegel, *Iteration of analytic functions*, Annals of Math. 43 (1942), 607-612. Earlier formal-power-series version: H. Poincaré, *Sur les propriétés des fonctions définies par les équations aux différences partielles*, thèse, 1879. Listed as §83 (additional statement 1) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). I did not find a Lean formalisation."
informal_solution = "Standard Siegel proof via majorant series. Write u(z) = ∑ uₙ zⁿ as a formal power series; the conjugacy equation f(u z) = u(λ z) yields the recursion (λⁿ − λ) uₙ = (terms in u_1, …, u_{n−1} and f₂, f₃, …). The denominator (λⁿ − λ) involves the small divisor (λⁿ − 1); for Diophantine α, |λⁿ − 1| ≥ c · |n|⁻τ for some τ > 0 and c > 0, so each uₙ is controlled by a bounded loss in the Cauchy estimates. The majorant-series technique bounds u by an explicit analytic majorant whose radius of convergence is positive; Siegel's geometric argument (replacing the formal series by an envelope) gives the analytic conjugacy directly. The Diophantine condition is essential: for Liouville α (rapidly approximable irrationals) the conjugacy can fail to be analytic, even though it always exists as a formal power series."
