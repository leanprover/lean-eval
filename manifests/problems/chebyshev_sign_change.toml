id = "chebyshev_sign_change"
title = "Hardy–Littlewood sign-change for the prime race mod 4"
test = false
module = "LeanEval.NumberTheory.ChebyshevSignChange"
holes = ["chebyshev_sign_change"]
submitter = "Kim Morrison"
notes = "The difference π₃(n) − π₁(n) between primes ≤ n in residue class 3 mod 4 and 1 mod 4 changes sign infinitely often: both {n : π₃(n) > π₁(n)} and {n : π₁(n) > π₃(n)} are infinite. This is the unconditional kernel of the **Chebyshev bias** observation (Chebyshev 1853 noted that π₃ is usually ahead, but Hardy–Littlewood 1914 showed unconditionally that π₁ overtakes infinitely often). §106 of Knill's *Some Fundamental Theorems in Mathematics* (boxed under the metamathematical 'strong law of small numbers', but the named unconditional content is this Hardy–Littlewood sign-change theorem)."
source = "G.H. Hardy and J.E. Littlewood, 'Contributions to the theory of the Riemann zeta-function and the theory of the distribution of primes', Acta Math. 41 (1916) 119–196 (announced 1914). Chebyshev's original observation: P. Chebyshev, letter to M. Fuss, 1853, in *Œuvres de P.L. Tchebychef*, vol. I (Saint Petersburg, 1899). Listed as §106 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "The proof uses zero-free regions of Dirichlet L-functions modulo 4 and Riemann's explicit formula. Let `Δ(x) := π₃(x) − π₁(x)`. Via Dirichlet characters, `Δ(x) ≈ ψ(x, χ)` where `ψ(x, χ) = ∑_{n≤x} Λ(n) χ(n)` and χ is the non-trivial real character mod 4. The explicit formula gives `ψ(x, χ) = −∑_ρ x^ρ / ρ + O(log² x)` over zeros ρ of L(s, χ). Assuming Δ(x) > 0 eventually, the Mellin transform of `Δ(x)/x` would have a sign-definite L-function behaviour incompatible with the symmetry of the zero set of L(s, χ) under ρ ↔ 1 − ρ̄: the contribution of zeros on the critical line oscillates with amplitude `x^{1/2}` (this oscillation is what produces the sign change). The argument is purely analytic and unconditional, using only the functional equation and the non-vanishing of L(s, χ) for Re(s) ≥ 1 (Dirichlet). Mathlib has `Nat.Prime`, `ZMod`, `Nat.primeCounting`, `Filter.limsup`/`liminf`, and Dirichlet's existence theorem (`Mathlib/NumberTheory/LSeries/PrimesInAP.lean`), but no Riemann explicit formula, no quantitative prime-counting in arithmetic progressions, no Hardy–Littlewood sign-change machinery; the `PrimeNumberTheoremAnd` external project still has PNT itself sorried."
