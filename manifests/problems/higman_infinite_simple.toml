id = "higman_infinite_simple"
title = "Higman's infinite finitely-presented simple group"
test = false
module = "LeanEval.GroupTheory.HigmanInfiniteSimple"
holes = ["higman_infinite_simple"]
submitter = "Kim Morrison"
notes = "There exists an infinite, finitely presented, simple group: some n and a finite relator set rels вЉ† FreeGroup (Fin n) for which PresentedGroup rels is both simple and infinite. Pure existence of a pathological finite presentation. The first such examples come from Higman's 1974 monograph (the HigmanвЂ“Thompson groups G_{n,r}); Higman's 1951 paper only constructs a finitely *generated* infinite simple group (a simple quotient of the four-generator group with no nontrivial finite quotients), not a finitely presented one. Mathlib v4.30 has FreeGroup, PresentedGroup, IsSimpleGroup, Infinite, HNN extensions (`Mathlib/GroupTheory/HNNExtension.lean`), and Britton's lemma, but no HigmanвЂ“Thompson construction, no Higman embedding theorem, and no construction of an infinite finitely-presented simple group. В§122 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "G. Higman, 'A finitely generated infinite simple group', J. London Math. Soc. 26 (1951) 61вЂ“64; G. Higman, *Finitely Presented Infinite Simple Groups*, Notes on Pure Mathematics 8, Australian National University, 1974. В§122 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Higman's 1974 monograph constructs the HigmanвЂ“Thompson groups G_{n,r} (for integers n в‰Ґ 2, r в‰Ґ 1) as groups of piecewise-linear bijections of certain Cantor-like spaces / r-tuples of n-ary trees. Each G_{n,r} is finitely presented (explicit finite generators and relations are written down) and infinite by construction; the commutator subgroups G_{n,r}' (or G_{n,r} itself for suitable n, r) are simple, by an analysis of the action on the underlying space. Higman's 1951 paper had earlier exhibited a finitely *generated* infinite simple group вЂ” a simple quotient of the four-generator group `вџЁa, b, c, d | babвЃ»В№ = aВІ, cbcвЃ»В№ = bВІ, dcdвЃ»В№ = cВІ, adaвЃ»В№ = dВІвџ©` with no nontrivial finite quotients вЂ” but did not give a finite presentation of the simple quotient. Mathlib v4.30 has the substrate (`FreeGroup`, `PresentedGroup`, `IsSimpleGroup`, `Infinite`, `Subgroup.IsNormalClosureFG`), HNN extensions and Britton's lemma (`Mathlib/GroupTheory/HNNExtension.lean`), but no HigmanвЂ“Thompson groups, no Higman embedding theorem, and no construction of an infinite finitely-presented simple group."
