id = "higman_infinite_simple"
title = "Higman's infinite finitely-presented simple group"
test = false
module = "LeanEval.GroupTheory.HigmanInfiniteSimple"
holes = ["higman_infinite_simple"]
submitter = "Kim Morrison"
notes = "There exists an infinite, finitely presented, simple group: some n and a finite relator set rels ⊆ FreeGroup (Fin n) for which PresentedGroup rels is both simple and infinite. Pure existence of a pathological finite presentation. Mathlib has FreeGroup, PresentedGroup, IsSimpleGroup, and Infinite, but no construction of any infinite finitely-presented simple group. §122 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "G. Higman, 'A finitely generated infinite simple group', J. London Math. Soc. 26 (1951) 61–64; G. Higman, *Finitely Presented Infinite Simple Groups*, Notes on Pure Mathematics 8, Australian National University, 1974. §122 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Higman's 1951 group is built from four generators `a, b, c, d` with relations expressing that conjugation cycles through them as `b · a = a²·b`, `c · b = b²·c`, `d · c = c²·d`, `a · d = d²·a` — a `chain of squarings'. Higman proves (i) this group is finitely presented by construction; (ii) it is infinite by a combinatorial argument tracking the lengths of normal forms under the cyclic conjugation; (iii) it is simple by Britton's lemma applied to the HNN-extension decomposition implicit in the relators (any normal subgroup containing a nontrivial element must contain the whole group). The 1974 monograph gives a different, shorter construction via Higman's embedding theorem applied to a Boone–Higman simulation of a Turing machine with halting set inside the simple group. Mathlib has the substrate (`FreeGroup`, `PresentedGroup`, `IsSimpleGroup`, `Infinite`, normal closures via `Subgroup.IsNormalClosureFG`) but no HNN extensions, no Britton's lemma, no Higman embedding theorem, and no construction of an infinite finitely-presented simple group."
