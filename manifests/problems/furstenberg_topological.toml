id = "furstenberg_topological"
title = "Furstenberg multiple recurrence theorem (topological version)"
test = false
module = "LeanEval.Dynamics.FurstenbergTopological"
holes = ["furstenberg_topological_recurrence"]
submitter = "Kim Morrison"
notes = "§56 of Knill's 'Some Fundamental Theorems in Mathematics'. Furstenberg–Weiss 1978: every homeomorphism T of a nonempty compact metric space X has a multiply recurrent point — for every d ≥ 1 there is a strictly increasing n : ℕ → ℕ with T^{j · n_k}(x) → x for every j ∈ {1, …, d}. The Challenge ships the IsMultiplyRecurrent predicate. The compact-metric hypothesis is essential under the sequential formulation: the shift on Ultrafilter ℤ (compact Hausdorff but not first-countable) was the disproving counterexample for an earlier compact-Hausdorff version — every convergent sequence in Ultrafilter ℤ is eventually constant, forcing n_k = 0 eventually, contradicting strict monotonicity. First-countability would also suffice but the classical Furstenberg–Weiss statement is for compact metric. Mathlib has Homeomorph, Function.iterate, Filter.Tendsto, and single-set Poincaré recurrence (the d = 1 case, Conservative.ae_mem_imp_frequently_image_mem in Mathlib/Dynamics/Ergodic/Conservative.lean), but no d ≥ 2 multiple recurrence — neither topological Furstenberg–Weiss nor measure-preserving Furstenberg. No open PR for furstenberg / multiple recurrence (verified 2026-05-27 against v4.30.0-rc1)."
source = "H. Furstenberg and B. Weiss, *Topological dynamics and combinatorial number theory*, Journal d'Analyse Mathématique 34 (1978), 61-85. Listed as §56 (main theorem) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). No formalization found in mathlib4 or any open mathlib PR; PFR project covers additive combinatorics but stops short of Furstenberg / Szemerédi for d ≥ 4."
informal_solution = "Standard proof via compactness + Zorn's lemma: introduce the product diagonal T̃ := (T, T², …, T^d) on Xᵈ. Pass to a minimal T̃-invariant nonempty closed subset M ⊆ Xᵈ (Zorn); pick (x₁, …, x_d) ∈ M and show via the multiple-iterated van der Waerden / IP-recurrence argument that the diagonal point (x, …, x) ∈ M for some x. Equivalently, prove the Furstenberg–Weiss colouring corollary by induction on d via topological IP-recurrence in product systems, and extract the recurrence point from the colour-preserving sequence. The d = 1 case is the classical Birkhoff recurrence, which uses the same Zorn-minimality argument."
