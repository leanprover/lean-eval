id = "sard_theorem"
title = "Sard's theorem (critical-set image has measure zero)"
test = false
module = "LeanEval.Geometry.SardTheorem"
holes = ["sard"]
submitter = "Kim Morrison"
notes = "For a smooth map f : ℝᵐ → ℝⁿ, the image of the critical set {x | rank df(x) < m ∧ rank df(x) < n} has Lebesgue measure zero. The manifold form follows chart-by-chart from this Euclidean version. Mathlib has the equal-dimension case (`addHaar_image_eq_zero_of_det_fderivWithin_eq_zero`) when det df = 0, plus topological corollaries via Hausdorff dimension (`ContDiff.dense_compl_range_of_finrank_lt_finrank`), but no general critical-set / Sard statement. §125 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "A.P. Morse, 'The behavior of a function on its critical set', Ann. of Math. (2) 40 (1939) 62–70; A. Sard, 'The measure of the critical values of differentiable maps', Bull. Amer. Math. Soc. 48 (1942) 883–890. §125 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "The classical proof works by induction on the source dimension `m`. (1) Stratify the critical set by rank: `C_r = {x | rank df(x) ≤ r}`. (2) For each stratum, locally straighten `f` using the implicit function theorem so that, in suitable coordinates, `f` factors as `(x_1, …, x_m) ↦ (x_1, …, x_r, g(x_1, …, x_m))` for a smooth `g` vanishing on `C_r`. (3) Apply the Fubini–Tonelli theorem to the product `ℝʳ × ℝᵐ⁻ʳ`: the image of the bad set is contained in countably many sets of the form `{constant} × g(slice)`, where each slice is `(m−r)`-dimensional; the higher-rank smoothness `C^{r+1}` (Whitney's threshold) controls the Taylor remainder enough to give measure zero in `ℝⁿ`. (4) Take a countable cover and absorb. Mathlib has the equal-dimension Jacobian-determinant lemma and Hausdorff-dimension topological corollaries but not the stratified-Fubini machinery, the inductive Whitney-threshold smoothness bookkeeping, or the general critical-set result."
