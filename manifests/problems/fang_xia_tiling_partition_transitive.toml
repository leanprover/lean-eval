id = "fang_xia_tiling_partition_transitive"
title = "Fang–Xia: tiling of the symmetric group by transpositions forces λ-transitivity"
test = false
module = "LeanEval.Combinatorics.FangXiaTiling"
holes = ["fang_xia_partition_transitive_of_tiling"]
submitter = "Kim Morrison"
notes = "If T_n = {1} ∪ {all transpositions} and (T_n, Y) tiles the symmetric group S_n (every element of S_n has a unique factorisation x · y with x ∈ T_n, y ∈ Y), then for every integer partition λ of n whose Young-diagram content sum is nonnegative, Y is λ-transitive in the Martin–Sagan sense: there is a fixed positive integer r such that, for every pair P, Q of ordered set partitions of shape λ, exactly r elements of Y send P to Q blockwise. Content sum is encoded in the row-length formula `∑ᵢ aᵢ · (aᵢ − 2i − 1)` (zero-indexed rows), matching the paper's one-indexed `λᵢ · (λᵢ − 2i + 1)`. Headline Theorem 1.4 of Fang–Xia, *Tiling the symmetric group by transpositions*, Bull. London Math. Soc. 58(5) (2026)."
source = "C. Fang and Y. Xia, 'Tiling the symmetric group by transpositions', Bull. London Math. Soc. 58(5) (2026); DOI 10.1112/blms.70366; arXiv:2506.00360. Earlier related work: A. Martin and B. Sagan, 'Transitivity of group actions on set partitions'."
informal_solution = "The paper proves Theorem 1.4 by Specht-module character theory on S_n. For a tiling (T_n, Y), the indicator function `1_{T_n}` and `1_Y` convolve to the constant function `n!`. Decomposing both sides into Specht modules using Frobenius's formula, the multiplicity of the irreducible labelled by λ in 1_{T_n} is `1 + ∑ᵢ aᵢ(aᵢ − 2i − 1) / (1 + n(n−1)/2)` after normalising, so the central-character content sum `c(λ) = ∑ᵢ aᵢ(aᵢ − 2i − 1)` controls whether the corresponding Specht component survives in 1_Y. When c(λ) ≥ 0 the Specht component cannot vanish in 1_Y, forcing Y to act transitively (with a fixed counting constant r > 0) on ordered set partitions of shape λ — the precise λ-transitivity statement above. Mathlib has `Equiv.Perm (Fin n)`, `Equiv.swap`, `Finset`, `YoungDiagram`, `Combinatorics.Tiling.Tile`, `SimpleGraph.Cayley`, and `RepresentationTheory.Character`, but no Specht-module / symmetric-group central-character content-sum theorem and no partition-transitivity API."
