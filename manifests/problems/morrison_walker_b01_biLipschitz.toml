id = "morrison_walker_b01_biLipschitz"
title = "Morrison–Walker Lemma B.0.1: adapting families of maps to open covers (bi-Lipschitz case)"
test = false
module = "LeanEval.Topology.AdaptingFamilies"
holes = ["morrison_walker_b01_biLipschitz"]
submitter = "Kim Morrison"
notes = "Lemma B.0.1 of Morrison–Walker, *The Blob Complex* (arXiv:1009.5025, Appendix B, pp. 93–96), bi-Lipschitz variant of clause 4. Each slice `f (p, ·)` is bundled as a homeomorphism `slice p : X ≃ₜ T` (capturing surjectivity), the paper's joint Lipschitz hypothesis ('f is Lipschitz in the P direction as well') is required via `LipschitzWith L f.toFun`, and a uniform Lipschitz constant for `(slice p).symm` is supplied. The conclusion produces the same bundled bi-Lipschitz homeomorphism structure for every slice `F (t, p, ·)`, while preserving clauses 1–3 of the continuous case. The smooth-diffeomorphism / immersion / PL variants are not stated. The paper explicitly does *not* prove the analogous statement for plain continuous homeomorphisms (cf. remark at the end of Appendix B; only Edwards–Kirby's 1-parameter version is known)."
source = "S. Morrison and K. Walker, *The Blob Complex*, arXiv:1009.5025, Appendix B, Lemma B.0.1 part 4, bi-Lipschitz case (pp. 93–96): https://arxiv.org/pdf/1009.5025"
informal_solution = "Use the same construction `F(t, p, x) := f(u(t, p, x), x)` as in the continuous case (see `morrison_walker_b01_continuous`). The slice regularity then follows from the chain rule: ∂F/∂x = ∂f/∂x + (∂f/∂p)(∂u/∂x), where ∂f/∂x is bi-Lipschitz with constant L (uniformly in p, by compactness of P), ∂f/∂p is bounded by the joint Lipschitz constant L, and ∂u/∂x is small because it depends on ∂rα/∂x and differences amongst the chosen points p(D₀, α), qβⁱ — differences that can be made arbitrarily small by choosing the cell decompositions Kα sufficiently fine. So F(t, p, ·) is bi-Lipschitz with a constant L' close to L."
