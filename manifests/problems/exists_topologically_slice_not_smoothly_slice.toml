id = "exists_topologically_slice_not_smoothly_slice"
title = "Existence of a topologically slice, not smoothly slice knot"
test = false
module = "LeanEval.KnotTheory.SliceDichotomy"
holes = ["exists_topologically_slice_not_smoothly_slice"]
submitter = "Kim Morrison"
notes = "The smooth/topological gap in dimension four. Casson, Akbulut-Matveyev, and Hedden-Kirk-Livingston gave explicit witnesses; Piccirillo later identified the smallest one as the Conway knot 11n34. The solver may choose any witness. Topological sliceness here means bounding a *locally flat* topological 2-disk in R^3 x [0, infty); the locally flat clause is essential since without it the cone over any knot is a topological disk."
source = "https://arxiv.org/abs/1808.02923"
informal_solution = "Take K = positive Whitehead double of a knot K_0 with tau(K_0) > 0 (e.g. the right-handed trefoil; Akbulut-Matveyev). Whitehead doubles always have trivial Alexander polynomial, so K is topologically slice by Freedman's theorem. The Ozsvath-Szabo tau-invariant of K equals tau(K_0) > 0, and tau is a smooth slice obstruction (tau != 0 implies not smoothly slice), so K is not smoothly slice."
