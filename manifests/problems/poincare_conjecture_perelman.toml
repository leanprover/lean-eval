id = "poincare_conjecture_perelman"
title = "Poincaré conjecture (Perelman 2003)"
test = false
module = "LeanEval.Geometry.PoincareConjecture"
holes = ["poincare_conjecture"]
submitter = "Kim Morrison"
notes = "A closed (compact, boundaryless), simply-connected, smooth 3-manifold M is homeomorphic to S³ ⊂ ℝ⁴. The [I.Boundaryless] instance pins 'closed' to the boundaryless meaning — otherwise D³ is a counterexample. [T2Space M] is the standard Hausdorffness convention smooth-manifold theorems assume but `IsManifold` does not bundle. `SimplyConnectedSpace M` already forces M nonempty. Mathlib v4.30 ships `Mathlib/Geometry/Manifold/PoincareConjecture.lean` (Junyan Xu 2024) with the topological framing of this statement as `proof_wanted` (`SimplyConnectedSpace.nonempty_homeomorph_sphere_three`); the proof is absent. Wiedijk-100 #84. §132 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "H. Poincaré, 'Cinquième complément à l'analysis situs', Rend. Circ. Mat. Palermo 18 (1904); G. Perelman, 'The entropy formula for the Ricci flow and its geometric applications' (arXiv:math/0211159), 'Ricci flow with surgery on three-manifolds' (arXiv:math/0303109), 'Finite extinction time for the solutions to the Ricci flow on certain three-manifolds' (arXiv:math/0307245). Wiedijk-100 #84. Listed as §132 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Perelman's proof runs Hamilton's Ricci flow `∂g/∂t = −2 Ric(g)` on the simply-connected closed 3-manifold M, then handles the finite-time singularities by *surgery* — cutting M along approximately-round 2-spheres developing along the singular regions, capping the resulting boundary components with 3-balls, and continuing the flow on the surgered manifold. The key ingredients are (i) Perelman's monotonicity formulas (entropy `F`, reduced volume `\\tilde V`) that rule out non-collapsed singularity formations of low-curvature type, (ii) the canonical-neighbourhood theorem classifying the local geometry near high-curvature points as ε-necks, ε-caps, or spherical space forms, (iii) the surgery procedure preserving the flow controlled by Hamilton–Ivey pinching, and (iv) finite extinction time for the simply-connected case. After finite extinction, M decomposes into a connected sum of spherical space forms; simple-connectivity collapses this to a single S³ summand. Mathlib has smooth manifolds and the standard sphere as a smooth manifold (`EuclideanSpace.instIsManifoldSphere`), but no Ricci flow, no monotonicity formulas, no canonical-neighbourhood theorem, no surgery, and no prime decomposition."
