id = "furstenberg_measure"
title = "Furstenberg multiple recurrence theorem (measure-preserving version)"
test = false
module = "LeanEval.Dynamics.FurstenbergMeasure"
holes = ["furstenberg_measure_recurrence"]
submitter = "Kim Morrison"
notes = "§56 of Knill's 'Some Fundamental Theorems in Mathematics' (additional statement). For every measure-preserving self-map T of a probability space (Ω, μ), every measurable A with μ A > 0, and every d ≥ 1, some n ≥ 1 satisfies μ(A ∩ T^{-n}A ∩ T^{-2n}A ∩ ⋯ ∩ T^{-d·n}A) > 0. Knill uses image notation P[A ∩ T_1(A) ∩ ⋯ ∩ T_d(A)] > 0 for an automorphism; we use preimages — equivalent for invertible measure-preserving T modulo a change of variables, and the standard formulation for general (non-invertible) measure-preserving maps. The d = 1 case is classical Poincaré recurrence. Mathlib has MeasurePreserving, IsProbabilityMeasure, and Poincaré recurrence for d = 1 (Conservative.ae_mem_imp_frequently_image_mem in Mathlib/Dynamics/Ergodic/Conservative.lean), but no d ≥ 2 multiple recurrence. Szemerédi's theorem — Furstenberg's combinatorial corollary — is also absent (only Roth k=3 is in mathlib, at Combinatorics/Additive/Corner/Roth.lean). No open PR for furstenberg / multiple recurrence (verified 2026-05-27 against v4.30.0-rc1)."
source = "H. Furstenberg, *Ergodic behavior of diagonal measures and a theorem of Szemerédi on arithmetic progressions*, Journal d'Analyse Mathématique 31 (1977), 204-256. Listed as §56 (additional statement 1) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). No formalization found in mathlib4 or any open mathlib PR; the Furstenberg–Katznelson generalization (to commuting transformations and to polynomial recurrence) is the input for the polynomial Szemerédi / Bergelson–Leibman theorems, also absent."
informal_solution = "Furstenberg's structure theorem proof: decompose T into a tower of compact (Kronecker) extensions and weakly-mixing extensions via van der Corput / spectral analysis. For each piece, multiple recurrence holds: (a) compact factors by uniform continuity and equidistribution; (b) weakly-mixing extensions by an IP* / Hindman-style hereditary recurrence. Combine via a lifting argument (Furstenberg–Zimmer). An alternative proof uses Tao's hypergraph regularity / removal lemma to deduce the measure-theoretic statement from the combinatorial Szemerédi theorem."
