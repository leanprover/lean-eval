id = "gauss_wantzel_prime"
title = "Gauss–Wantzel constructibility (prime case)"
test = false
module = "LeanEval.NumberTheory.GaussWantzel"
holes = ["gauss_wantzel_prime"]
submitter = "Kim Morrison"
notes = "§87 (additional statement 3) of Knill's 'Some Fundamental Theorems in Mathematics'. For an odd prime p, the regular p-gon (equivalently cos(2π/p)) is ruler-and-compass constructible iff p is a Fermat prime 2^(2^k) + 1. This is Knill's 'n is a Fermat prime' specialised to prime n; the full Gauss–Wantzel theorem allows n = 2^a · ∏ distinct Fermat primes. The file ships a small inductive IsConstructible : ℝ → Prop bundling the smallest subfield of ℝ closed under real square roots — the textbook algebraic equivalent of ruler-and-compass constructibility, and the form needed to apply Galois theory. Mathlib has Galois theory, cyclotomic fields (CyclotomicField, IsCyclotomicExtension), and Fermat-number infrastructure (Nat.fermatNumber), but no ruler-and-compass constructibility theory and no Gauss–Wantzel theorem; grep -ri 'constructible.*real\\|gauss[_-]?wantzel' in mathlib returns no hits. The proof reduces to [ℚ(cos(2π/p)) : ℚ] = (p-1)/2 being a power of 2 ⇔ p − 1 is a power of 2 ⇔ p is a Fermat prime."
source = "C. F. Gauss, *Disquisitiones Arithmeticae* (1801), §365 — sufficiency: a Fermat prime gives a constructible polygon, with the famous 17-gon construction; necessity proved by P. L. Wantzel, *Recherches sur les moyens de reconnaître si un problème de géométrie peut se résoudre avec la règle et le compas*, J. Math. Pures Appl. 2 (1837), 366-372. Listed as §87 (additional statement 3) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). I did not find a Lean formalisation."
informal_solution = "Standard proof in two implications. (→) Suppose cos(2π/p) is constructible. The constructible reals form an iterated quadratic tower over ℚ, so [ℚ(cos(2π/p)) : ℚ] is a power of 2. The minimal polynomial of cos(2π/p) over ℚ has degree (p − 1)/2 (it is the real subfield of the cyclotomic field ℚ(ζ_p), and [ℚ(ζ_p) : ℚ(cos(2π/p))] = 2 since ζ_p + ζ_p⁻¹ = 2 cos(2π/p)); since [ℚ(ζ_p) : ℚ] = p − 1, (p − 1)/2 is a power of 2, so p − 1 = 2^m, hence p = 2^m + 1. For prime 2^m + 1, m itself must be a power of 2 (if m had an odd factor d > 1, then 2^(m/d) + 1 would divide 2^m + 1, contradicting primality). So p = 2^(2^k) + 1 is a Fermat prime. (←) Conversely, suppose p = 2^(2^k) + 1 is a Fermat prime. The cyclotomic field ℚ(ζ_p) has Galois group (ℤ/p)^× of order p − 1 = 2^(2^k), a 2-group; the Galois correspondence gives a tower of quadratic extensions from ℚ to ℚ(ζ_p), and each quadratic step is constructible by quadratic formula and real square roots. The real subfield ℚ(cos(2π/p)) sits in this tower, so cos(2π/p) is constructible."
