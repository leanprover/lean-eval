id = "fraser_kakeya_fourier_decay"
title = "Fraser: Fourier decay for finite-field Kakeya sets is q^{-1} and sharp"
test = false
module = "LeanEval.Combinatorics.FraserKakeya"
holes = ["fraser_kakeya_fourier_decay_and_sharp"]
submitter = "Kim Morrison"
notes = "For every d ≥ 2, every finite-field Kakeya set K ⊆ F_q^d (a subset containing a line in every direction) supports a probability measure μ whose finite-field Fourier transform `μ̂(ξ) = ∑_x χ(-ξ·x) μ(x)` satisfies `‖μ̂(ξ)‖ ≤ q^{-1}` at every nonzero frequency, and this exponent is sharp in every dimension: for every κ ∈ (0, 1) some threshold Q makes the bound `κ · q^{-1}` saturated by every probability measure on a suitable Kakeya set, for every finite field of cardinality ≥ Q. Headline Theorem 2.4 of Fraser, *Fourier analytic properties of Kakeya sets in finite fields*, arXiv:2505.09464."
source = "J.M. Fraser, 'Fourier analytic properties of Kakeya sets in finite fields', Bull. London Math. Soc. 58(5) (2026); DOI 10.1112/blms.70367; arXiv:2505.09464."
informal_solution = "Fraser proves the bound by a finite-field analogue of the classical Mockenhaupt–Tao decay argument. Construct μ as the normalised counting measure on a maximal Kakeya configuration; the dual Fourier identity `|μ̂(ξ)|² = ∑_x μ * μ̃ (x) χ(-ξ·x)` reduces decay at ξ to additive-energy estimates `E(K, x · ⟨ξ⟩^⊥)` against affine lines, and the Kakeya property delivers a uniform line-count bound that yields the `q^{-1}` exponent. The sharpness construction uses a probabilistic Kakeya set built from a random line through every direction, whose autocorrelation Fourier coefficient at a suitable rational direction is forced down to `(1 − o(1)) q^{-1}`. Mathlib has the substrate (`AddChar`, primitive finite-field additive characters via `AddChar.FiniteField.primitiveChar_to_Complex`, `Submodule`, `Module.finrank`, `Fintype.card`, `Set.ncard`, and the discrete Fourier API on finite abelian groups) but no finite-field Kakeya theorem, no matching Salem-set API, and no formalisation of arXiv:2505.09464."
