id = "solvable_by_radicals_converse"
title = "Solvable extensions ↔ solvable groups (the missing converse in Abel–Ruffini)"
test = false
module = "LeanEval.Algebra.SolvableByRadicals"
holes = ["solvable_iff_solvableByRad"]
submitter = "Kim Morrison"
notes = "§58 of Knill's 'Some Fundamental Theorems in Mathematics' (additional statement). For F : Field of characteristic zero and a nonzero p : F[X], every root of p in AlgebraicClosure F lies in solvableByRad F (AlgebraicClosure F) iff p.Gal is solvable. Mathlib has the → direction in Mathlib/FieldTheory/AbelRuffini.lean: isSolvable_gal_of_irreducible / isSolvable_gal_minpoly prove that a radical root has solvable minimal-polynomial Galois group, and the file header docstring states 'this file proves one direction of the Abel–Ruffini theorem'. The ← direction (solvable Galois group implies roots in solvableByRad) is the Kummer-theory content and is not in mathlib (verified against v4.30.0-rc1; no open solvableByRad / AbelRuffini / kummer PR targeting the converse as of 2026-05-27). No irreducibility hypothesis assumed: this is the polynomial-level iff, while the existing mathlib theorem is stated for an irreducible polynomial with a chosen radical root."
source = "É. Galois (1832); the iff appears in standard texts such as Stewart, *Galois Theory* (Theorem 18.10); Lang, *Algebra* (VI §7); Rotman, *Galois Theory* (Theorem 73). Listed as §58 (additional statement 2) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). Mathlib provides the → direction; the ← direction is absent."
informal_solution = "Classical proof of the ← direction: assume p.Gal is solvable. Adjoin to F a sufficient root of unity (a primitive n-th root for n = |p.Gal|) to obtain F' = F(ζ); the Galois group Gal(p over F') is a subgroup of Gal(p over F) hence still solvable, and F'/F is itself a radical extension. Take a composition series 1 = G₀ ◁ G₁ ◁ ⋯ ◁ Gₖ = Gal(p over F') with each factor cyclic of prime order. The corresponding tower of fixed fields F' = E₀ ⊂ E₁ ⊂ ⋯ ⊂ Eₖ has each Eᵢ₊₁/Eᵢ cyclic of prime order over a field containing the relevant root of unity; by Kummer theory each step is a pure radical extension Eᵢ(ⁿ√aᵢ)/Eᵢ. The splitting field of p sits inside Eₖ, so every root of p in AlgebraicClosure F lies in solvableByRad F (AlgebraicClosure F). The → direction follows from the existing mathlib lemma isSolvable_gal_of_irreducible applied to each irreducible factor."
