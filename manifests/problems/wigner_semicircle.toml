id = "wigner_semicircle"
title = "Wigner semicircle law"
test = false
module = "LeanEval.Analysis.WignerSemicircle"
holes = ["wigner_semicircle"]
submitter = "Kim Morrison"
notes = "For an iid family X i j : Ω → ℝ of mean-0, variance-1 real random variables (parameterised over upper-triangular pairs i ≤ j), the empirical spectral measure of the real-symmetric matrix W_n / √n (with W_n(i, j) = X (min i j) (max i j)) converges weakly, almost surely, to the semicircle measure on [−2, 2] with density √(4 − x²) / (2π). Weak convergence is encoded directly in test-function form: for every bounded continuous f, almost surely ∫ f dμ_n → ∫ f dμ_∞. §102 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "E. Wigner, 'Characteristic vectors of bordered matrices with infinite dimensions', Ann. of Math. (2) 62 (1955) 548–564. Universality: L. Pastur 1972; Z. Bai, Y. Yin 1988; L. Erdős, B. Schlein, H.-T. Yau, 'Wegner estimate and level repulsion for Wigner random matrices', Comm. Math. Phys. 287 (2009) 641–655 and the subsequent ESY program. Listed as §102 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Two main approaches: (i) the **moment method**, computing ∫ x^k dμ_n → ∫ x^k dμ_∞ for every k and identifying the limit moments as the Catalan numbers C_(k/2) (matching the semicircle moments via non-crossing pair partitions on k vertices); (ii) the **Stieltjes-transform method**, showing the Stieltjes transform s_n(z) of μ_n satisfies a fixed-point equation that converges to the semicircle Stieltjes transform s(z) = (-z + √(z² − 4))/2. Mathlib has the spectral framework (`Matrix.IsHermitian.eigenvalues`), iid hypotheses (`iIndepFun`, `IdentDistrib`), and weak convergence on Polish spaces (`Mathlib/MeasureTheory/Measure/Portmanteau.lean`), but no semicircle measure, no Stieltjes transform, no Catalan-number combinatorics on non-crossing partitions, and no random-matrix universality framework."
