id = "fary_milnor"
title = "Fáry–Milnor theorem (knot total curvature ≤ 4π implies unknotted)"
test = false
module = "LeanEval.Geometry.FaryMilnor"
holes = ["fary_milnor_total_curvature"]
submitter = "Kim Morrison"
notes = "A smooth knot in ℝ³ with total curvature at most 4π is unknotted. A knot is a smooth, regular, 2π-periodic, simple-on-`[0, 2π)` curve `r : ℝ → ℝ³`. Curvature is the standard parametrized expression `‖r'(t) × r''(t)‖ / ‖r'(t)‖³`; total curvature is the arc-length integral. Unknottedness is encoded as a smooth isotopy through smooth knots from r to the standard unit circle. Mathlib has the analytic primitives (`deriv`, interval integrals, `ContDiff`, `crossProduct`, Euclidean norm) but no knot-total-curvature / unknottedness API. §161 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "I. Fáry, 'Sur la courbure totale d'une courbe gauche faisant un nœud', Bull. Soc. Math. France 77 (1949) 128–138; J. Milnor, 'On the total curvature of knots', Ann. of Math. (2) 52 (1950) 248–257. §161 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "The classical proof argues by contradiction via the **crookedness** invariant `μ(r)` of a knot: for a unit vector `u ∈ S²`, count the number of local maxima of the height function `t ↦ ⟨r(t), u⟩`; `μ(r)` is the infimum of this count over generic `u`. (1) `μ(r) ≥ 2` always (each maximum is balanced by a minimum). (2) A nontrivial knot has `μ(r) ≥ 4` (this is the crookedness–knottedness lemma; it follows from Alexander's theorem that a knot bounding an embedded disk in some half-space is unknotted). (3) An integral-geometric identity (Crofton-style averaging over `S²`) gives `∫_{S²} (#crit) dσ(u) = 2 · totalCurvature(r)`; combined with (1)–(2), `totalCurvature(r) ≥ 2π · μ(r) ≥ 4π` for any nontrivial knot, hence total curvature ≤ 4π forces unknottedness. Mathlib has interval integrals, deriv, `ContDiff`, and `crossProduct`, but no knot framework, no crookedness invariant, no Crofton-style integral-geometric identities, and no unknottedness criterion."
