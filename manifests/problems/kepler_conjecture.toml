id = "kepler_conjecture"
title = "Kepler conjecture (optimal sphere packing in ℝ³)"
test = false
module = "LeanEval.Geometry.KeplerConjecture"
holes = ["kepler_conjecture"]
submitter = "Kim Morrison"
notes = "The optimal sphere-packing density in three dimensions equals π / √18, the density of the face-centred-cubic packing. The packing is taken over arbitrary (not necessarily lattice) sets of centres in ℝ³, with density defined via the limsup of the fraction of B_R(0) covered by the union of unit balls. §96 of Knill's *Some Fundamental Theorems in Mathematics*. The d = 8 (Viazovska) sphere-packing case is being formalised separately in `thefundamentaltheor3m/Sphere-Packing-Lean` and is excluded from this submission per the dedicated-external-project rule."
source = "Kepler conjecture 1611 (J. Kepler, *Strena seu de Nive Sexangula*); proof T. Hales, 'A proof of the Kepler conjecture', Ann. of Math. (2) 162 (2005) 1065–1185; formal verification in HOL Light + Isabelle by the Flyspeck project (T. Hales et al., completed August 2014), Forum Math. Pi 5 (2017) e2. Wiedijk-1000 #209; listed as §96 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Hales's proof reduces optimality to a finite-but-massive nonlinear-optimisation problem over the local Voronoi cells of a packing. The reduction proceeds by (i) a Delaunay decomposition encoding around each centre, (ii) a *score* function on simplices that upper-bounds the local density, and (iii) the **fcc-compatibility lemma** showing that the local score is maximised on the fcc configuration. Step (iii) decomposes into roughly 100 000 linear-programming subproblems certified by interval-arithmetic computation; the Flyspeck formal verification (HOL Light core + Isabelle/HOL for LP) discharged every subproblem mechanically. Mathlib has Lebesgue volume on `EuclideanSpace ℝ (Fin 3)`, ZLattice covolume, and limsup, but no packing density, no Voronoi/Delaunay machinery, no nonlinear-LP framework, and no Flyspeck-style certified interval arithmetic."
