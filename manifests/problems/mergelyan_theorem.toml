id = "mergelyan_theorem"
title = "Mergelyan's theorem (polynomial approximation on compact ℂ-sets with connected complement)"
test = false
module = "LeanEval.ComplexAnalysis.Mergelyan"
holes = ["mergelyan"]
submitter = "Kim Morrison"
notes = "§64 (additional statement 4) of Knill's 'Some Fundamental Theorems in Mathematics'. For a compact K ⊆ ℂ with connected complement and f : ℂ → ℂ continuous on K and analytic on interior K, f is the uniform limit on K of complex polynomials. Mergelyan extends Runge's theorem (rational approximation) to polynomial approximation under the connected-complement hypothesis. Mathlib has Weierstrass and Stone–Weierstrass for C([a, b], ℝ), but grep -rn 'mergelyan' returns no hits. Aristotle closed entire_to_poly (Taylor partial sums approximate entire functions uniformly on compacta) sorry-free and reduced Mergelyan to entire_approx — the ∂̄-equation step that needs the Cauchy–Green / Pompeiu operator, not in mathlib v4.28.0."
source = "S. N. Mergelyan, *On the representation of functions by series of polynomials on closed sets*, Doklady Akad. Nauk SSSR 78 (1951), 405-408 (Russian). Listed as §64 (additional statement 4) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). I did not find a Lean formalisation."
informal_solution = "Standard Mergelyan proof reduces to two ingredients. (i) Vitushkin-style approximation: under the connected-complement hypothesis, every continuous f on K analytic on interior K extends to an entire function on the whole plane after suitable cutoff via the Cauchy–Green / Pompeiu operator on a smooth bump that is 1 near K. (ii) Polynomial approximation of entire functions on compacts: an entire function is uniformly approximable on any compact by its Taylor partial sums (already in mathlib's analytic API). Combining (i) and (ii) gives polynomial approximation of f on K to within any ε. The harder direction of (i) is the construction of the entire-function approximant from f using the ∂̄-equation, which requires the Pompeiu operator (the integral kernel inverting ∂̄ on ℂ)."
