notes = "For a C¬π map f : ‚Ñù‚Åø ‚Üí ‚Ñù‚Åø with an invertible hyperbolic fixed point x‚ÇÄ (no eigenvalue of df‚Çì‚ÇÄ on the unit circle, plus invertibility to exclude the degenerate zero-eigenvalue case), some open neighbourhood U ‚àã x‚ÇÄ carries the local stable set WÀ¢ = U ‚à© {x | f^[k] x ‚Üí x‚ÇÄ} and the local unstable set W·µò = U ‚à© {x | ‚àÉ backward orbit converging to x‚ÇÄ}, with WÀ¢ ‚à© W·µò = {x‚ÇÄ}. This is Hadamard‚ÄìPerron in its barest topological form; the full theorem additionally asserts that WÀ¢, W·µò are immersed C¬π submanifolds tangent to the stable/unstable eigenspaces (same proof difficulty). The intersection clause WÀ¢ ‚à© W·µò = {x‚ÇÄ} is the content: in a hyperbolic system, only x‚ÇÄ has both forward and backward orbits converging to x‚ÇÄ. ¬ß104 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "J. Hadamard, 'Sur l'it√©ration et les solutions asymptotiques des √©quations diff√©rentielles', Bull. Soc. Math. France 29 (1901); O. Perron, '√úber Stabilit√§t und asymptotisches Verhalten der Integrale von Differentialgleichungssystemen', Math. Z. 29 (1929) 129‚Äì160. Listed as ¬ß104 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "The Hadamard graph-transform proof: write `f` near `x‚ÇÄ` as `f(x‚ÇÄ + v) = x‚ÇÄ + A v + g(v)` with `A = df(x‚ÇÄ)`, `g(v) = o(‚Äñv‚Äñ)`. The hyperbolic splitting `‚Ñù‚Åø = EÀ¢ ‚äï E·µò` (stable / unstable eigenspaces of `A`) lets one parametrise the candidate `WÀ¢` as the graph of a Lipschitz function `œÉ : EÀ¢ ‚Üí E·µò` near 0, with `œÉ(0) = 0`. The graph transform `G(œÉ) := graph of (the new function whose graph is f(graph œÉ) ‚à© small box)` is a contraction on the Banach space of Lipschitz functions `EÀ¢ ‚Üí E·µò` of small Lipschitz constant, because the stable direction contracts under `A` and the unstable direction expands (Banach fixed point). The unique fixed-point graph is the local stable manifold; the same argument with `f‚Åª¬π` gives `W·µò`. Hyperbolicity forces `WÀ¢ ‚à© W·µò = {x‚ÇÄ}`: a point on both has its forward iterates bounded (lying on the bounded `WÀ¢`) and its backward iterates bounded too, but the hyperbolic splitting forces such doubly-bounded orbits to be {x‚ÇÄ}. Mathlib has `fderiv`, `ContDiff`, `Filter.Tendsto`, `Polynomial.roots`, and `LinearMap.charpoly`, but no Hadamard‚ÄìPerron theorem, no graph-transform machinery, no stable/unstable manifold framework, and no `IsHyperbolicLinear` predicate."
