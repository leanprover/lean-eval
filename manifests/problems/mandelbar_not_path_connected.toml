id = "mandelbar_not_path_connected"
title = "Mandelbar (tricorn) is not path-connected (Hubbard–Inou–Schleicher)"
test = false
module = "LeanEval.ComplexAnalysis.Mandelbar"
holes = ["mandelbar_not_path_connected"]
submitter = "Kim Morrison"
notes = "§62 (additional statement 2) of Knill's 'Some Fundamental Theorems in Mathematics'. The mandelbar (tricorn) is the connectedness locus of the antiholomorphic family z ↦ z̄² + c; the Hubbard–Inou–Schleicher theorem (2009) says it is not path-connected. The file ships two helper definitions: Tantibar (the antiholomorphic iterator) and Mandelbar. **Note on Knill's typo:** Knill writes the iterator as z ↦ z̄ + c (degree 1). With that literal map the orbit of 0 is 0, c, 2 Re c, 2 Re c + c, …, bounded iff Re c = 0, so the connectedness locus is the imaginary axis — path-connected, contradicting Knill's claim. The standard mandelbar / tricorn is the degree-2 antiholomorphic family z ↦ z̄² + c; this file formalises that corrected statement. Mathlib has Function.iterate, IsPathConnected, and starRingEnd ℂ for complex conjugation, but no mandelbar / tricorn definition. The proof uses parabolic-implosion on the parabolic-arc ears of the mandelbar's hyperbolic components. Aristotle round 2 closed 16 supporting lemmas and reduced the gap to the Inou–Hubbard–Schleicher parabolic-implosion core not_joinedIn_zero_c_ear, far beyond mathlib."
source = "J. H. Hubbard, H. Inou, and D. Schleicher, *On the structure of the mandelbar set* (2009; see also S. Nakane, *Connectedness of the tricorn*, Ergodic Theory Dynam. Systems 13 (1993), 349-356, for the connectedness side). Listed as §62 (additional statement 2) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). Knill writes the iterator as z̄ + c, which is a typo (the resulting locus would be the path-connected imaginary axis); the formalisation uses the standard degree-2 form z̄² + c. I did not find a Lean formalisation."
informal_solution = "Hubbard–Inou–Schleicher's proof picks an explicit pair of parameters c_0 and c_1 in distinct 'ears' (parabolic-arc components) of the mandelbar, and shows by a parabolic-implosion / perturbation argument that no path in the mandelbar can connect them: along any candidate path the renormalisation Σ-conjugacy class would have to change discontinuously through a parabolic-implosion bifurcation, but parabolic implosion is discontinuous in the parameter, contradicting path-continuity. The argument adapts holomorphic-dynamics techniques (Lavaurs maps, Écalle cylinders) to the antiholomorphic setting; the central technical lemma identifies the critical orbit's escape rate as a discontinuous-but-pointwise-finite function on the parabolic ears."
