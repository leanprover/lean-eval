id = "derived_solidification_free_CW_homology"
title = "Derived solidification of free CW complexes (light condensed mathematics)"
test = false
module = "LeanEval.CondensedMathematics.DerivedSolidCWHomology"
holes = ["LightCondensed.Solid.solidification", "LightCondensed.Solid.solidification_additive", "LightCondensed.Solid.solidificationAdjunction", "LightCondensed.Solid.derivedSolidification", "LightCondensed.Solid.derivedSolidificationCounit", "LightCondensed.Solid.derivedSolidification_isLeftDerivedFunctor", "LightCondensed.Solid.derivedSolidificationAdjunction", "LightCondensed.Solid.derivedSolidification_free_CW_homologyIso", "LightCondensed.Solid.derivedSolidification_free_CW_homology"]
submitter = "Dagur Asgeirsson"
notes = "Extracted from the LeanCondensed project, which develops Clausen–Scholze light condensed mathematics in Lean. The trusted part of the file defines light solid abelian groups (a light condensed abelian group is solid if 1 - shift acts invertibly on internal homs out of P = ℤ[ℕ∪{∞}]/ℤ[∞]) and shows the category of solid objects is abelian with an exact inclusion into light condensed abelian groups. The holes ask for the solidification functor with its adjunction, the derived solidification functor characterized as the total left derived functor of degreewise solidification, the derived adjunction, and finally the comparison theorem: for a CW complex X, the homology of the derived solidification of the free light condensed abelian group ℤ[X] is integral singular homology (in cohomological degree -n). The adjunctions and derived-functor property pin the data holes down up to natural isomorphism, so the final theorem has its intended content."
source = "https://github.com/dagurtomas/LeanCondensed (LeanCondensed/Projects/DerivedSolidCWHomology.lean); D. Clausen and P. Scholze, lectures on analytic stacks and light condensed mathematics.; P. Scholze, Lectures on Condensed Mathematics, https://arxiv.org/pdf/2605.03658"
informal_solution = "Solidification exists by a light-condensed adjoint functor theorem (the solid objects form a reflective subcategory closed under limits and colimits). Derived solidification is the total left derived functor, which exists since the category of solid abelian groups has a compact projective generator. For the comparison: see Example 6.5 in https://arxiv.org/pdf/2605.03658"
