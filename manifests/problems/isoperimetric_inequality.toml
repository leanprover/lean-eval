id = "isoperimetric_inequality"
title = "Isoperimetric inequality (Knill formulation)"
test = false
module = "LeanEval.Geometry.IsoperimetricInequality"
holes = ["isoperimetric"]
submitter = "Kim Morrison"
notes = "§71 of Knill's 'Some Fundamental Theorems in Mathematics'. For any measurable bounded B ⊆ ℝⁿ with n ≥ 2, n^n · volume(B)^{n−1} · volume(closedBall 0 1) ≤ μHE[n−1](frontier B)^n, where μHE[n−1] is the (n−1)-dimensional Euclidean Hausdorff measure (scaled so its restriction to an (n−1)-dim affine subspace equals Lebesgue). The 2 ≤ n hypothesis matches Knill's 'smooth surface in ℝⁿ homeomorphic to a sphere' setup, which presupposes n ≥ 2; the n = 1 case admits the counterexample B = ∅ (LHS = 1·0^0·2 = 2 in ℝ≥0∞, RHS = 0) and is excluded after Codex and Aristotle both surfaced exactly this witness. The statement is stated for B = frontier (topological boundary), which agrees with smooth surface area when B has C¹ boundary and is the geometric-measure-theory extension Knill mentions. Mathlib has MeasureTheory.Measure.euclideanHausdorffMeasure (notation μHE[d]), EuclideanSpace.volume_ball / volume_closedBall, and frontier, but no isoperimetric inequality, no Brunn-Minkowski, no perimeter / De Giorgi perimeter, no Minkowski content; Wiedijk-100 entry 'The Isoperimetric Theorem' has no decl in docs/100.yaml. No open mathlib PRs for 'isoperimetric' or 'Brunn-Minkowski' (verified 2026-05-27 against v4.30.0-rc1). Bhavik Mehta's mirajcs/IsoperimetricInequality (2026) covers only the planar n = 2 fragment L² ≥ 4πA via Hurwitz/Fourier — does not extend to the n-dimensional GMT statement. Both Aristotle v2 jobs (on the 2 ≤ n form) returned inconclusive; Codex round-2 review clean across all five audited axes."
source = "Classical (Greek geometry); n-dimensional form: De Giorgi (1958), Federer (1969). Listed as §71 (Wiedijk-100 entry, no decl) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). HOL Light has the n-dimensional version (J. Harrison), Mizar has the planar form; Lean has only the n = 2 planar fragment (mirajcs/IsoperimetricInequality, 2026)."
informal_solution = "Standard proof via Brunn–Minkowski and Steiner symmetrization. (1) Steiner-symmetrize B over n hyperplanes — each step preserves volume and decreases surface area, converging (in any reasonable distance) to a ball B* of the same volume. (2) For the ball, equality holds: n · vol(B*) = vol(unit ball) · radius^n and surface area = n · vol(unit ball) · radius^{n−1}, so n^n · vol(B*)^{n−1} · vol(B₁) = (n · vol(B*) / radius)^n · radius^n = (surface area)^n. (3) For general B, lower-semicontinuity of the (n−1)-Hausdorff measure of the frontier under Steiner symmetrization gives the inequality. Alternative routes: optimal transport (Brenier map, Knothe rearrangement), Sobolev W^{1,1} → L^{n/(n−1)} via Federer–Fleming with co-area, or Gromov's proof via Buhovsky–Tao. Each route requires ~500–5000 LoC of new measure-theoretic formalization absent from mathlib v4.28.0."
