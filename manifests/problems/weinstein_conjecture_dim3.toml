id = "weinstein_conjecture_dim3"
title = "Weinstein conjecture in dimension three (Taubes 2007)"
test = false
module = "LeanEval.Geometry.WeinsteinConjecture3D"
holes = ["weinstein_conjecture_dim_three"]
submitter = "Kim Morrison"
notes = "Every Reeb vector field of a contact form on a closed smooth 3-manifold has a closed periodic orbit. Mathlib lacks contact-geometry API and a manifold exterior derivative, so the encoding fixes dα by the intrinsic coordinate-free identity dα(X, Y) = X(α(Y)) − Y(α(X)) − α([X, Y]) (which uniquely determines dα from α via mathlib's mfderiv + VectorField.mlieBracket), and uses the equivalent dimension-3 contact condition `α nowhere zero ∧ dα nondegenerate on ker α' in place of `α ∧ dα nowhere zero'. [I.Boundaryless] is essential: on the cube [0,1]³ with α = dz + x·dy, every Reeb integral curve has affine z-component with |z'| = 1 and escapes the cube, so closed orbits do not exist without the boundaryless hypothesis. §141 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "C.H. Taubes, 'The Seiberg–Witten equations and the Weinstein conjecture', Geom. Topol. 11 (2007) 2117–2202; arXiv:math/0611007. Conjecture: A. Weinstein, 'On the hypotheses of Rabinowitz' periodic orbit theorems', J. Differential Equations 33 (1979) 353–358. §141 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Taubes proves the conjecture by relating Reeb dynamics to Seiberg–Witten Floer homology via the deformation `(α, J) ↦ (rα, J)`. On a closed contact 3-manifold (Y, ξ = ker α), the Seiberg–Witten Floer homology in suitable Spin^c structures is nonvanishing — controlled by the canonical Spin^c structure associated to ξ — and the energy bound from Seiberg–Witten theory forces, in the limit `r → ∞`, the existence of a closed orbit of the Reeb vector field of α. Concretely, the SW solutions on Y × ℝ concentrate along Reeb orbits as r → ∞, and the obstruction to having no closed Reeb orbit contradicts the nonvanishing of SWF(Y, s) for s arising from the contact structure. This is the deepest 3-dimensional contact-topology result; mathlib has smooth manifolds, tangent spaces, mfderiv, and Lie brackets, but no contact structures, no Seiberg–Witten Floer homology, no embedded contact homology, and no Reeb dynamics framework."
