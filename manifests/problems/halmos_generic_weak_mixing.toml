id = "halmos_generic_weak_mixing"
title = "Halmos's generic weak-mixing theorem"
test = false
module = "LeanEval.Dynamics.HalmosGenericWeakMixing"
holes = ["generic_weakly_mixing"]
submitter = "Kim Morrison"
notes = "On a non-atomic standard probability space (X, m), the set of weakly mixing measure-preserving automorphisms contains a dense Gδ in the weak topology on the automorphism group, and every weakly mixing automorphism is ergodic. The weak topology on `Automorphism m` is the topology generated by neighbourhoods `{T | m((T '' A) ∆ (T₀ '' A)) < ε}` over base points T₀, measurable A, and ε > 0; this matches Knill's `T_j → T` iff `m(T_j(A) ∆ T(A)) → 0` for every measurable A. Weak mixing is the Cesàro decay `|m((T^k)⁻¹ A ∩ B) − m A · m B|` → 0. The [NoAtoms m] hypothesis is essential: on an atomic space the automorphism group is finite, the weak topology is discrete, dense forces G = univ, but the identity is not weakly mixing. §90 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "P.R. Halmos, 'In general a measure-preserving transformation is mixing', Ann. of Math. (2) 45 (1944) 786–792, and *Lectures on Ergodic Theory*, Chelsea, 1956. Variants and the structural Baire-category framework: A. Katok and A. Stepin (1967); J.R. Choksi (1965). Listed as §90 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Halmos's proof has two ingredients: (i) **the weak topology is Polish** — by the standard-Borel hypothesis, Aut(X, m) embeds into the unit ball of L²(X, m)' via Koopman, equipping it with a separable complete metric; (ii) **weak mixing is a Gδ condition** — `T` is weakly mixing iff for every pair `A, B` of measurable sets, `1/n · ∑_{k<n} |m((T^k)⁻¹ A ∩ B) − m A · m B| → 0`, which is a countable intersection of open conditions (using density of measurable sets in the σ-algebra). For density of the weakly-mixing set, Halmos uses a category argument: dyadic-permutation automorphisms are dense in Aut(X, m) (Rokhlin's lemma), each open neighbourhood of any T contains a weakly mixing automorphism by perturbation, hence the set of weakly mixing T's is dense. Mathlib has `MeasurePreserving`, `Ergodic`, `IsGδ`, `Dense`, and `symmDiff`, but no `Automorphism` bundled type, no weak topology, no `IsWeaklyMixing` predicate, no Rokhlin-style density argument, and no Baire-category framework for the automorphism group."
