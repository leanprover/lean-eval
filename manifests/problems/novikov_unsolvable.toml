id = "novikov_unsolvable"
title = "Novikov's theorem: the word problem is undecidable for finitely presented groups"
test = false
module = "LeanEval.GroupTheory.NovikovUnsolvable"
holes = ["novikov_unsolvable"]
submitter = "Kim Morrison"
notes = "There exists a finitely presented group with undecidable word problem. Concretely: some n and a finite relator set rels ⊆ FreeGroup (Fin n) for which the canonical surjection PresentedGroup.mk rels has no `ComputablePred' decision procedure for `w ↦ φ (FreeGroup.mk w) = 1'. Pure existence of a pathological finite presentation; the negation (every finite presentation has solvable word problem) was disproved by Novikov 1955 and independently by Boone 1958. §122 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "P.S. Novikov, 'On the algorithmic unsolvability of the word problem in group theory', Trudy Mat. Inst. Steklov. 44 (1955) 1–143 (Russian); W.W. Boone, 'The word problem', Ann. of Math. (2) 70 (1959) 207–265 (announced 1958). §122 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "Novikov and Boone construct a finite presentation of a group simulating the halting problem of a universal Turing machine. The construction has three layers. (1) Encode a (universal) Turing machine M whose halting problem is undecidable as a finitely presented **semigroup** via Markov's `T-systems' / Post's tag-systems — a fixed list of rewriting rules. (2) Lift the semigroup presentation to a finitely presented **group** by Boone's machinery (HNN extensions + Britton's lemma), preserving the equivalence: the question `does M halt on input x' becomes the question `does the word w_x equal 1 in the constructed group G'. (3) Since the halting problem is undecidable, so is the word problem of G; G is finitely presented by construction. Mathlib has `FreeGroup', `PresentedGroup', `Group.IsFinitelyPresented', and the `ComputablePred' / `Computable' / `Partrec' / `Nat.Partrec.Code' computability stack, but no HNN extensions, no Britton's lemma, no Markov / tag-system encoding of Turing machines, and no Novikov / Boone result."
