id = "bezout_projective_multiplicity"
title = "Bézout's theorem (projective, with multiplicity)"
test = false
module = "LeanEval.AlgebraicGeometry.Bezout"
holes = ["bezout_multiplicity"]
submitter = "Kim Morrison"
notes = "§50 of Knill's 'Some Fundamental Theorems in Mathematics' (with-multiplicity reading). For n homogeneous polynomials f_k of degrees d_k ≥ 1 in n+1 variables over an algebraically closed field with finite common projective zero set, ∑ᶠ p ∈ ⋂ V(f_k), intersectionMultiplicity f p = ∏ d_k (equation in ℕ∞). The Challenge ships a self-contained construction of intersectionMultiplicity via the affine-cone approach (Eisenbud, Commutative Algebra, Chapter 12): chartIndex p picks i with p.rep i ≠ 0; affineConeCoord p is the line-of-K·p.rep representative with q_i = 1; maxIdealAt q is ker(eval q) (maximal by RingHom.ker_isMaximal_of_surjective); localRingAt q := Localization.AtPrime (maxIdealAt q); intersectionMultiplicity f p := Module.length K (R_q ⧸ (f_1, …, f_n, X_i − 1)). The X_i − 1 factor cuts the cone down to the transverse hyperplane slice, recovering the projective multiplicity. Module.length (codomain ℕ∞) honestly reports ⊤ on positive-dimensional components; under _hfin the quotient is finite-dimensional. Mathlib has Projectivization, MvPolynomial.IsHomogeneous, Module.length / Module.length_eq_finrank, Localization.AtPrime / IsLocalization.AtPrime.isLocalRing, and IsAlgClosed.card_roots_eq_natDegree (the n = 1 base case), but no projective Bézout theorem in any form, no intersection-multiplicity construction, and no vanishingSet / dehomogenization API. Codex round-3 review clean across drift / multiplicity definition / Module.length codomain / quantifier edges / external formalizations; both Aristotle jobs inconclusive (positive S closed n = 0 base case sorry-free but could not close the n ≥ 1 inductive step — needs regular sequences for finite projective intersections, Hilbert series multiplicativity, and CRT for Artinian rings, none in mathlib v4.28.0)."
source = "É. Bézout, *Théorie générale des équations algébriques*, Paris, 1779. Listed as §50 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). Wiedijk-100 entry #60 'Bézout's Theorem' refers to the integer gcd identity (in HOL Light / Isabelle / Lean / Agda-unimath), not the projective intersection statement, which has no formalization in any major prover. No open mathlib PR for 'bezout' (verified 2026-05-27 against v4.30.0-rc1)."
informal_solution = "Classical proof via Hilbert series: for each k ≥ 1 the graded piece (K[X_0, …, X_n] / (f_1, …, f_k))_d has Hilbert polynomial of degree n − k and leading coefficient d_1 ⋯ d_k / (n − k)!. After cutting by all n forms the algebra is Artinian and the length of its degree-d piece equals ∏ d_k for d ≫ 0 (Macaulay 1916); the local-Hilbert-series decomposition then redistributes this as a sum of local multiplicities at the finitely many intersection points. Alternative deformation proof: degenerate the f_k continuously to f̃_k = ∏_j (X_{k+1} − α_{k,j} · X_0) (distinct α_{k,j} ∈ K); the deformed intersection has exactly ∏ d_k transverse points (multiplicity 1 each) by linear algebra; continuity of the Hilbert function under flat families shows ∑ imult does not change along the deformation."
