id = "anosov_bowen_shadowing"
title = "Anosov–Bowen shadowing lemma"
test = false
module = "LeanEval.Dynamics.HyperbolicShadowing"
holes = ["hyperbolic_has_shadowing"]
submitter = "Kim Morrison"
notes = "Every compact hyperbolic invariant set K ⊆ ℝᵈ of a C¹ diffeomorphism T : ℝᵈ → ℝᵈ admits an open neighbourhood U ⊇ K such that every ε-pseudo-orbit of T inside U is δ-close to a true forward T-orbit (for ε sufficiently small relative to δ). Hyperbolicity is encoded structurally: a continuous stable/unstable splitting `ℝᵈ = Eˢ x ⊕ Eᵘ x` for each `x ∈ K`, with uniform contraction rate `λ ∈ (0,1)` and constant `C > 0`. The Euclidean formulation captures Knill's content faithfully — any compact hyperbolic set on a smooth manifold embeds into some ℝᵈ via Whitney, and shadowing is local near K, so no manifold-with-corners infrastructure is needed. §67 of Knill's *Some Fundamental Theorems in Mathematics*."
source = "D.V. Anosov, 'Geodesic flows on closed Riemannian manifolds with negative curvature', Trudy Mat. Inst. Steklov. 90 (1967); R. Bowen, 'ω-limit sets for Axiom A diffeomorphisms', J. Differential Equations 18 (1975) 333–339. Listed as §67 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf)."
informal_solution = "The classical proof uses (i) **cone fields**: a smooth field of stable and unstable cones around the splitting that is forward-invariant under `dT` (resp. backward-invariant under `dT⁻¹`); (ii) **graph transform**: the local stable/unstable manifolds at each point are constructed as fixed points of a contraction on the space of graphs over `Eˢ` (resp. `Eᵘ`) inside the cone field; (iii) **shadowing fixed point**: an ε-pseudo-orbit `(xₙ)` in a small neighbourhood of `K` is shadowed by a true orbit obtained as the fixed point of a contraction on bounded sequences `(yₙ)` with `yₙ` near `xₙ`, the contraction being a uniform consequence of the hyperbolic splitting. Mathlib has `fderiv`, `ContDiff`, `Submodule` complementarity (`IsCompl`), and `Function.iterate`, but no hyperbolic-dynamics infrastructure: no cone fields, no graph-transform machinery, no shadowing theorem, no Anosov / Axiom A diffeomorphism predicates."
